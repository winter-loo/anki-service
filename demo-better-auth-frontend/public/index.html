<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Anki Service + Better Auth Demo</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 860px; margin: 40px auto; padding: 0 16px; }
      input { padding: 8px; width: 320px; }
      button { padding: 8px 12px; }
      pre { background: #111; color: #eee; padding: 12px; overflow: auto; }
      .row { margin: 10px 0; }
    </style>
  </head>
  <body>
    <h1>Anki Service + Better Auth (minimal demo)</h1>

    <p>
      This page signs you in using Better Auth (email/password), then requests a short-lived JWT
      from <code>/api/anki-token</code> and uses it to call the Anki Service.
    </p>

    <h2>1) Sign up / Sign in</h2>
    <div class="row">
      <input id="email" placeholder="email" />
    </div>
    <div class="row">
      <input id="password" placeholder="password" type="password" />
    </div>
    <div class="row">
      <button id="signup">Sign up</button>
      <button id="signin">Sign in</button>
      <button id="signout">Sign out</button>
    </div>

    <h2>2) Call anki-service (JWT)</h2>
    <div class="row">
      <button id="getToken">Get Anki JWT</button>
      <button id="listNotes">/api/note/list</button>
    </div>

    <h2>Output</h2>
    <pre id="out"></pre>

    <script type="module">
      const out = document.getElementById('out');
      const log = (x) => out.textContent = typeof x === 'string' ? x : JSON.stringify(x, null, 2);

      async function post(url, body) {
        const r = await fetch(url, {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(body),
          credentials: 'include',
        });
        const t = await r.text();
        let data;
        try { data = JSON.parse(t); } catch { data = t; }
        if (!r.ok) throw new Error(typeof data === 'string' ? data : JSON.stringify(data));
        return data;
      }

      async function get(url) {
        const r = await fetch(url, { credentials: 'include' });
        const data = await r.json().catch(async () => await r.text());
        if (!r.ok) throw new Error(typeof data === 'string' ? data : JSON.stringify(data));
        return data;
      }

      // These Better Auth endpoints depend on Better Auth's route API.
      // If the exact paths differ, check Better Auth docs and adjust.
      // This demo expects common endpoints under /api/auth.
      document.getElementById('signup').onclick = async () => {
        try {
          const email = document.getElementById('email').value;
          const password = document.getElementById('password').value;
          const name = email.includes('@') ? email.split('@')[0] : email;
          const data = await post('/api/auth/sign-up/email', { email, password, name });
          log(data);
        } catch (e) { log(String(e)); }
      };

      document.getElementById('signin').onclick = async () => {
        try {
          const email = document.getElementById('email').value;
          const password = document.getElementById('password').value;
          const data = await post('/api/auth/sign-in/email', { email, password });
          log(data);
        } catch (e) { log(String(e)); }
      };

      document.getElementById('signout').onclick = async () => {
        try {
          const data = await post('/api/auth/sign-out', {});
          log(data);
        } catch (e) { log(String(e)); }
      };

      let jwt = null;
      document.getElementById('getToken').onclick = async () => {
        try {
          const data = await get('/api/anki-token');
          jwt = data.token;
          log({ gotTokenFor: data.sub, tokenPreview: jwt.slice(0, 24) + '...' });
        } catch (e) { log(String(e)); }
      };

      document.getElementById('listNotes').onclick = async () => {
        try {
          if (!jwt) throw new Error('Get Anki JWT first');
          const ankiBase = (window.ANKI_SERVICE_URL || 'http://localhost:8000');
          const r = await fetch(ankiBase + '/api/note/list', {
            headers: { Authorization: 'Bearer ' + jwt },
          });
          const data = await r.json();
          log(data);
        } catch (e) { log(String(e)); }
      };
    </script>
  </body>
</html>
